<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benchmark Results</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --topbar-bg: #0f172a;
      --topbar-text: #f8fafc;
      --topbar-muted: #94a3b8;
      --row-alt: #f8fafc;
      --score-0-bg: #fee2e2; --score-0-fg: #dc2626;
      --score-1-bg: #ffedd5; --score-1-fg: #ea580c;
      --score-2-bg: #fef9c3; --score-2-fg: #ca8a04;
      --score-3-bg: #dcfce7; --score-3-fg: #16a34a;
      --diff-easy-bg: #f0fdf4;   --diff-easy-fg: #15803d;
      --diff-medium-bg: #fefce8; --diff-medium-fg: #a16207;
      --diff-hard-bg: #fff1f2;   --diff-hard-fg: #be123c;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --border: #334155;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --text-muted: #475569;
        --topbar-bg: #020617;
        --topbar-text: #f8fafc;
        --topbar-muted: #475569;
        --row-alt: #162032;
        --score-0-bg: #450a0a; --score-0-fg: #fca5a5;
        --score-1-bg: #431407; --score-1-fg: #fdba74;
        --score-2-bg: #422006; --score-2-fg: #fde68a;
        --score-3-bg: #052e16; --score-3-fg: #86efac;
        --diff-easy-bg: #052e16;   --diff-easy-fg: #86efac;
        --diff-medium-bg: #422006; --diff-medium-fg: #fde68a;
        --diff-hard-bg: #4c0519;   --diff-hard-fg: #fda4af;
      }
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--text-primary);
    }

    .topbar {
      background: var(--topbar-bg);
      color: var(--topbar-text);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 52px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .topbar-title { font-weight: 600; font-size: 14px; letter-spacing: 0.02em; }
    .topbar-model {
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      font-size: 13px;
      color: var(--topbar-muted);
    }
    .topbar-right { display: flex; align-items: center; gap: 20px; font-size: 13px; color: var(--topbar-muted); }
    .topbar-right span { display: flex; align-items: center; gap: 6px; }

    main { max-width: 1280px; margin: 0 auto; padding: 24px 24px 48px; }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px 20px 18px;
    }
    .card-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .card-value {
      font-size: 28px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
      color: var(--text-primary);
    }
    .card-sub {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .val-green { color: #16a34a; }
    .val-amber { color: #ca8a04; }
    .val-red   { color: #dc2626; }

    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .chart-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
    }
    .chart-box h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .chart-box canvas { display: block; width: 100% !important; }

    .table-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .table-header h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .table-hint { font-size: 12px; color: var(--text-muted); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      padding: 10px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      background: var(--surface);
    }
    th[data-sort] {
      cursor: pointer;
      user-select: none;
    }
    th[data-sort]:hover { color: var(--text-primary); }
    th[aria-sort="ascending"]::after  { content: " ↑"; opacity: 1; }
    th[aria-sort="descending"]::after { content: " ↓"; opacity: 1; }
    th[data-sort]::after { content: " ↕"; opacity: 0.3; }

    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:nth-child(even) { background: var(--row-alt); }
    tbody tr:hover { background: var(--border); }
    td { padding: 10px 16px; vertical-align: top; }
    .td-question { max-width: 320px; color: var(--text-primary); }
    .td-question-text { overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .td-category { color: var(--text-secondary); white-space: nowrap; }
    .td-score { white-space: nowrap; }
    .td-reasoning { color: var(--text-secondary); font-size: 12px; line-height: 1.5; max-width: 380px; }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 22px;
      padding: 0 7px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .badge-score-0 { background: var(--score-0-bg); color: var(--score-0-fg); }
    .badge-score-1 { background: var(--score-1-bg); color: var(--score-1-fg); }
    .badge-score-2 { background: var(--score-2-bg); color: var(--score-2-fg); }
    .badge-score-3 { background: var(--score-3-bg); color: var(--score-3-fg); }

    .badge-diff {
      display: inline-flex;
      align-items: center;
      height: 20px;
      padding: 0 7px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge-diff-easy   { background: var(--diff-easy-bg);   color: var(--diff-easy-fg); }
    .badge-diff-medium { background: var(--diff-medium-bg); color: var(--diff-medium-fg); }
    .badge-diff-hard   { background: var(--diff-hard-bg);   color: var(--diff-hard-fg); }

    @media (max-width: 900px) {
      .cards { grid-template-columns: repeat(2, 1fr); }
      .charts { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .cards { grid-template-columns: 1fr 1fr; }
      main { padding: 16px; }
    }
  </style>
</head>
<body>

<header class="topbar" role="banner">
  <div class="topbar-left">
    <span class="topbar-title">Physical Reasoning Benchmark</span>
    <span class="topbar-model" id="topbarModel"></span>
  </div>
  <div class="topbar-right">
    <span id="topbarTimestamp"></span>
    <span id="topbarCount"></span>
  </div>
</header>

<main>
  <div class="cards" role="region" aria-label="Summary metrics">
    <div class="card">
      <div class="card-label">Overall Score</div>
      <div class="card-value" id="metricOverallPct"></div>
      <div class="card-sub" id="metricOverallAvg"></div>
    </div>
    <div class="card">
      <div class="card-label">Best Category</div>
      <div class="card-value val-green" id="metricBestPct"></div>
      <div class="card-sub" id="metricBestName"></div>
    </div>
    <div class="card">
      <div class="card-label">Worst Category</div>
      <div class="card-value val-red" id="metricWorstPct"></div>
      <div class="card-sub" id="metricWorstName"></div>
    </div>
    <div class="card">
      <div class="card-label">Avg Judge Score</div>
      <div class="card-value" id="metricAvgScore"></div>
      <div class="card-sub">out of 3.00</div>
    </div>
  </div>

  <div class="charts" role="region" aria-label="Charts">
    <div class="chart-box">
      <h2>Accuracy by Category</h2>
      <canvas id="categoryChart" aria-label="Horizontal bar chart of accuracy percentage per category"></canvas>
    </div>
    <div class="chart-box">
      <h2>Score Distribution by Difficulty</h2>
      <canvas id="difficultyChart" aria-label="Stacked bar chart of score distribution by difficulty"></canvas>
    </div>
  </div>

  <div class="table-section" role="region" aria-label="Results table">
    <div class="table-header">
      <h2>All Results</h2>
      <span class="table-hint">Click column headers to sort</span>
    </div>
    <div class="table-wrap">
      <table id="resultsTable">
        <thead>
          <tr>
            <th scope="col">Question</th>
            <th scope="col" data-sort="category" aria-sort="none">Category</th>
            <th scope="col" data-sort="difficulty" aria-sort="none">Difficulty</th>
            <th scope="col" data-sort="score" aria-sort="none">Score</th>
            <th scope="col">Judge Reasoning</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
  const DATA = {"model": "llama-3.3-70b-versatile", "timestamp": "2026-03-25 19:32:56", "totalQuestions": 5, "overallAvg": 0.8, "overallPct": 26.7, "bestCategory": {"name": "Buoyancy", "pct": 26.7}, "worstCategory": {"name": "Buoyancy", "pct": 26.7}, "categories": [{"name": "Buoyancy", "avg": 0.8, "pct": 26.7, "count": 5}], "difficultyDistribution": [{"label": "Easy", "counts": [1, 0, 1, 0]}, {"label": "Medium", "counts": [0, 1, 0, 0]}, {"label": "Hard", "counts": [1, 1, 0, 0]}], "rows": [{"id": "bu_001", "question": "A ship made of steel floats, but a solid steel ball sinks. Explain how the ship floats despite being made of the same material.", "category": "Buoyancy", "difficulty": "Easy", "score": 2, "reasoning": "The student is on the right track by mentioning the creation of empty spaces and the relationship between volume and density, but the explanation could be more explicit and clear about the concept of buoyancy and density relative to water."}, {"id": "bu_002", "question": "A fish bladder (swim bladder) allows fish to remain neutrally buoyant at various depths. However, if a fish is quickly moved to a much greater depth, what happens and why?", "category": "Buoyancy", "difficulty": "Medium", "score": 1, "reasoning": "The student correctly identifies the cause of the fish becoming negatively buoyant, but fails to explain the underlying physical mechanism (increase in pressure and decrease in swim bladder volume) in a clear and explicit manner."}, {"id": "bu_003", "question": "You place a sealed empty bottle (air inside) in water and push it fully submerged. Compare the buoyant force when it is 0.5 m deep versus 5 m deep.", "category": "Buoyancy", "difficulty": "Hard", "score": 1, "reasoning": "The student is partially correct that the buoyant force depends on the volume of the water displaced, but their response fails to account for the effect of increased pressure with depth on the volume of the air in the bottle, which is a critical aspect in comparing buoyant forces at different depths."}, {"id": "bu_004", "question": "A helium balloon is inside a sealed car. The car accelerates forward. Which direction does the balloon move relative to the car — forward, backward, or does it stay put?", "category": "Buoyancy", "difficulty": "Hard", "score": 0, "reasoning": "The student's response is wrong as it directly contradicts the correct explanation of the apparent rearward force and the resulting pressure gradient within the accelerating car."}, {"id": "bu_005", "question": "A block of wood floats in water with 70% of its volume submerged. What is the wood's density relative to water?", "category": "Buoyancy", "difficulty": "Easy", "score": 0, "reasoning": "The student merely provides a numerical value without explaining the relationship between the wood's and water's densities, neglecting the crucial concept of equilibrium and the corresponding equation to derive the correct answer."}]};

  const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  Chart.defaults.color = dark ? '#94a3b8' : '#64748b';
  Chart.defaults.borderColor = dark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
  Chart.defaults.font.family = "system-ui, -apple-system, 'Segoe UI', sans-serif";
  Chart.defaults.font.size = 12;

  const SCORE_COLORS = ['#ef4444', '#f97316', '#eab308', '#22c55e'];
  const SCORE_LABELS = ['Score 0', 'Score 1', 'Score 2', 'Score 3'];

  function pctColor(pct) {
    if (pct >= 75) return '#16a34a';
    if (pct >= 50) return '#ca8a04';
    return '#dc2626';
  }

  function pctColorClass(pct) {
    if (pct >= 75) return 'val-green';
    if (pct >= 50) return 'val-amber';
    return 'val-red';
  }

  function setText(id, text) {
    document.getElementById(id).textContent = text;
  }

  function setClass(id, cls) {
    document.getElementById(id).classList.add(cls);
  }

  // Top bar
  setText('topbarModel', DATA.model);
  setText('topbarTimestamp', DATA.timestamp);
  setText('topbarCount', DATA.totalQuestions + ' questions');

  // Metric cards
  const overallClass = pctColorClass(DATA.overallPct);
  const overallEl = document.getElementById('metricOverallPct');
  overallEl.textContent = DATA.overallPct + '%';
  overallEl.classList.add(overallClass);
  setText('metricOverallAvg', DATA.overallAvg.toFixed(2) + ' avg score');

  setText('metricBestPct', DATA.bestCategory.pct + '%');
  setText('metricBestName', DATA.bestCategory.name);

  const worstEl = document.getElementById('metricWorstPct');
  worstEl.textContent = DATA.worstCategory.pct + '%';
  setText('metricWorstName', DATA.worstCategory.name);

  const avgEl = document.getElementById('metricAvgScore');
  avgEl.textContent = DATA.overallAvg.toFixed(2);
  avgEl.classList.add(pctColorClass(DATA.overallPct));

  // Category bar chart (horizontal)
  const catLabels = DATA.categories.map(c => c.name);
  const catPcts = DATA.categories.map(c => c.pct);
  const catColors = catPcts.map(p => pctColor(p) + (dark ? 'cc' : 'dd'));

  new Chart(document.getElementById('categoryChart'), {
    type: 'bar',
    data: {
      labels: catLabels,
      datasets: [{
        data: catPcts,
        backgroundColor: catColors,
        borderWidth: 0,
        borderRadius: 3,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ' ' + ctx.parsed.x.toFixed(1) + '%'
          }
        }
      },
      scales: {
        x: {
          min: 0,
          max: 100,
          ticks: { callback: v => v + '%' },
          grid: { color: Chart.defaults.borderColor }
        },
        y: {
          grid: { display: false },
          ticks: { font: { size: 12 } }
        }
      }
    }
  });

  // Difficulty stacked bar chart
  const diffLabels = DATA.difficultyDistribution.map(d => d.label);
  const diffDatasets = [0, 1, 2, 3].map(i => ({
    label: SCORE_LABELS[i],
    data: DATA.difficultyDistribution.map(d => d.counts[i]),
    backgroundColor: SCORE_COLORS[i] + (dark ? 'cc' : 'dd'),
    borderWidth: 0,
    borderRadius: i === 3 ? 3 : 0,
  }));

  new Chart(document.getElementById('difficultyChart'), {
    type: 'bar',
    data: { labels: diffLabels, datasets: diffDatasets },
    options: {
      responsive: true,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { boxWidth: 12, padding: 16, font: { size: 12 } }
        },
        tooltip: { mode: 'index' }
      },
      scales: {
        x: {
          stacked: true,
          grid: { display: false }
        },
        y: {
          stacked: true,
          ticks: { stepSize: 1 },
          grid: { color: Chart.defaults.borderColor }
        }
      }
    }
  });

  // Results table
  const DIFF_RANK = { easy: 0, medium: 1, hard: 2 };
  let sortCol = null;
  let sortDir = 1;
  let rows = [...DATA.rows];

  function renderTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    rows.forEach(r => {
      const tr = document.createElement('tr');

      const tdQ = document.createElement('td');
      tdQ.className = 'td-question';
      const qText = document.createElement('div');
      qText.className = 'td-question-text';
      qText.textContent = r.question;
      qText.title = r.question;
      tdQ.appendChild(qText);

      const tdCat = document.createElement('td');
      tdCat.className = 'td-category';
      tdCat.textContent = r.category;

      const tdDiff = document.createElement('td');
      const diffBadge = document.createElement('span');
      diffBadge.className = 'badge badge-diff badge-diff-' + r.difficulty.toLowerCase();
      diffBadge.textContent = r.difficulty;
      tdDiff.appendChild(diffBadge);

      const tdScore = document.createElement('td');
      tdScore.className = 'td-score';
      const scoreBadge = document.createElement('span');
      scoreBadge.className = 'badge badge-score-' + r.score;
      scoreBadge.textContent = r.score;
      scoreBadge.setAttribute('aria-label', 'Score ' + r.score + ' out of 3');
      tdScore.appendChild(scoreBadge);

      const tdReason = document.createElement('td');
      tdReason.className = 'td-reasoning';
      tdReason.textContent = r.reasoning;

      tr.append(tdQ, tdCat, tdDiff, tdScore, tdReason);
      tbody.appendChild(tr);
    });
  }

  function sortBy(col) {
    const headers = document.querySelectorAll('th[data-sort]');
    headers.forEach(th => {
      th.setAttribute('aria-sort', 'none');
    });

    if (sortCol === col) {
      sortDir *= -1;
    } else {
      sortCol = col;
      sortDir = 1;
    }

    const activeHeader = document.querySelector('th[data-sort="' + col + '"]');
    activeHeader.setAttribute('aria-sort', sortDir === 1 ? 'ascending' : 'descending');

    rows.sort((a, b) => {
      let va = a[col];
      let vb = b[col];
      if (col === 'score') {
        return (va - vb) * sortDir;
      }
      if (col === 'difficulty') {
        return (DIFF_RANK[va.toLowerCase()] - DIFF_RANK[vb.toLowerCase()]) * sortDir;
      }
      return va.localeCompare(vb) * sortDir;
    });

    renderTable();
  }

  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => sortBy(th.dataset.sort));
  });

  renderTable();
</script>
</body>
</html>
